  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header { text-align: center; margin-bottom: 32px; }
    .header .icon { font-size: 48px; margin-bottom: 8px; }
    .header h1 { font-size: 22px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; }
    .header p { margin-top: 8px; color: #666; font-size: 14px; }
    .search-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .search-row input {
      width: 100%; padding: 14px 18px; font-size: 18px;
      border: 2px solid #e0e0e0; border-radius: 10px; outline: none;
      letter-spacing: 2px; font-weight: 600; color: #1a1a2e; transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: #0f3460; }
    .search-row button {
      width: 100%; padding: 14px 22px;
      background: linear-gradient(135deg, #0f3460, #1a6fb5);
      color: white; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .result { padding: 20px; border-radius: 12px; border: 2px solid; display: none; }
    .result.visible { display: flex; align-items: flex-start; gap: 12px; }
    .result-icon { font-size: 24px; flex-shrink: 0; }
    .result-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .result-text { font-size: 14px; line-height: 1.6; color: #333; font-weight: 500; }
    .footer { text-align: center; font-size: 12px; color: #aaa; margin-top: 24px; }
    .type-success { background: #f0fdf4; border-color: #86efac; }
    .type-success .result-label { color: #166534; }
    .type-zonaroja { background: #fff3f3; border-color: #ffcccc; }
    .type-zonaroja .result-label { color: #cc0000; }
    .type-notfound { background: #f5f5f5; border-color: #ddd; }
    .type-notfound .result-label { color: #888; }
    .type-special { background: #fff8e1; border-color: #ffe082; }
    .type-special .result-label { color: #b45309; }
  </style>
</head>

    function getResponse(cp) {
      const val = CP_DATA[cp];
      if (!val) return { type: 'notfound', text: 'No se encontró información para este código postal.' };
      const [c, d, e, f, g] = val.split('|');
      if (c === 'NO') {
        const hasExtra = (e && e.trim()) || (f && f.trim()) || (g && g.trim());
        if (hasExtra) return { type: 'special', text: [e, f, g].filter(x => x && x.trim()).join(' | ') };
        return { type: 'zonaroja', text: 'Este código postal no aplica en promoción FOR por posible zona roja y/o caminos no aptos para la circulación. Lo que se puede ofertar al cliente es la entrega en algún código postal que sí tenga cobertura y de ahí pueda trasladarlo.' };
      }
      let result = (d && d.trim())
        ? 'APLICA PROMOCIÓN FOR CON COTIZACIÓN PREVIA (favor de enviar la cotización al grupo de embarques para enviarla a la fletera).'
        : 'APLICA PROMOCIÓN FOR.';
      if (e && e.trim()) result = result.replace(/\.$/, '') + ' Y/O APLICARÍA ENTREGA DIRECTA EN KASSEL.';
      if (f && f.trim()) result = result.replace(/\.$/, '') + ' CON EL COSTO DE ' + f.trim() + '.';
      if (g && g.trim()) result = result.replace(/\.$/, '') + ' ' + g.trim() + '.';
      return { type: 'success', text: result };
    }

    const labels = { success: 'Cobertura disponible', zonaroja: 'Zona restringida', notfound: 'No encontrado', special: 'Condiciones especiales' };
    const icons  = { success: '✅', zonaroja: '🚫', notfound: '❓', special: '⚠️' };

    function handleSearch() {
      const cp = document.getElementById('cpInput').value.trim();
      if (!cp) return;
      const res = getResponse(cp);
      const box = document.getElementById('resultBox');
      box.className = 'result visible type-' + res.type;
      document.getElementById('resultIcon').textContent = icons[res.type];
      document.getElementById('resultLabel').textContent = labels[res.type];
      document.getElementById('resultText').textContent = res.text;
    }

    document.getElementById('cpInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });
    document.getElementById('footer').textContent = 'Base de datos con ' + Object.keys(CP_DATA).length.toLocaleString() + ' códigos postales';
  </script>
